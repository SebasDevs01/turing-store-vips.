<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Turing Store | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/image.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        turingRed: '#E63946',
                        turingDark: '#111111',
                        turingDarkCard: '#1A1A1A',
                        turingLight: '#F8F9FA'
                    }
                }
            }
        }
    </script>
    <style>
        /* Base and Dark/Light Mode Transitions */
        html,
        body {
            font-family: 'Montserrat', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            width: 100vw;
        }

        /* Custom UI Elements matching the original txt inspiration but in Red/White */
        .ts-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid transparent;
            border-radius: 10px;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Light Mode Specifics */
        .light .ts-input {
            background-color: white;
            border-color: #E2E8F0;
            color: #111;
        }

        .light .ts-input:focus {
            border-color: #E63946;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.2);
        }

        .ts-card {
            background-color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #E2E8F0;
        }

        .dark .ts-card {
            background: #0a0a0a;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dark .ts-input {
            background: #111111;
            /* Explicit very dark gray/black to fix Android rendering */
            border: 1px solid #2d3748;
            color: #e2e8f0;
        }

        .dark .ts-input:focus {
            border-color: #E63946;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }

        /* Submit Button */
        .ts-btn {
            width: 100%;
            padding: 14px 16px;
            border: 0;
            border-radius: 10px;
            background: #E63946;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.25s all ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ts-btn:hover {
            background: #D62828;
            box-shadow: 0 0 16px rgba(230, 57, 70, 0.6);
            transform: translateY(-2px);
        }

        .dark .ts-text-muted {
            color: #A0AEC0;
        }

        .light .ts-text-muted {
            color: #4A5568;
        }
    </style>
    <link rel="icon" href="assets/image.png" type="image/png">

    <!-- Theme Check before render -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body
    class="min-h-screen flex items-center justify-center py-20 sm:py-12 px-4 sm:px-6 lg:px-8 bg-turingLight dark:bg-black relative">

    <!-- Theme Toggle -->
    <button id="themeToggle"
        class="absolute top-4 right-4 sm:top-6 sm:right-6 p-3 rounded-full bg-white dark:bg-turingDarkCard shadow-lg text-turingRed transition-transform hover:scale-110 z-50">
        <i class="fa-solid fa-moon dark:hidden text-xl"></i>
        <i class="fa-solid fa-sun hidden dark:block text-xl text-yellow-400"></i>
    </button>

    <div class="ts-card w-full max-w-md p-10 rounded-2xl relative transition-colors duration-300">
        <div id="loadingOverlay"
            class="hidden absolute inset-0 bg-white/90 dark:bg-black/90 flex items-center justify-center rounded-2xl z-50 backdrop-blur-sm">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-turingRed"></div>
        </div>

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center h-24 mb-4 w-auto px-4">
                <img src="assets/image.png" alt="Turing Logo"
                    class="h-16 w-16 mx-auto mb-4 object-contain filter drop-shadow-[0_0_15px_rgba(230,57,70,0.8)] dark:hidden"
                    onerror="this.src='https://via.placeholder.com/150?text=Turing'">
                <img src="assets/Logoblanco.png" alt="Turing Logo"
                    class="hidden h-16 w-16 mx-auto mb-4 object-contain filter drop-shadow-[0_0_15px_rgba(230,57,70,0.8)] dark:block"
                    onerror="this.src='https://via.placeholder.com/150?text=Turing'">
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">
                Acceso VIP
            </h2>
            <p class="mt-2 text-sm ts-text-muted">
                O <a href="registro.html"
                    class="font-bold text-turingRed hover:text-red-700 transition-colors">regístrate aquí</a>
            </p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMessage"
                class="hidden bg-red-500/10 border border-red-500/50 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg text-sm font-medium text-center transition-all">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="errorText">Error</span>
            </div>

            <div>
                <input id="email" name="email" type="text" required class="ts-input"
                    placeholder="Correo electrónico o Usuario">
            </div>
            <div class="relative">
                <input id="password" name="password" type="password" required class="ts-input pr-10"
                    placeholder="Contraseña">
                <i class="fa-solid fa-eye-slash absolute right-4 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-500 hover:text-turingRed transition-colors"
                    onclick="togglePasswordVisibility('password', this)"></i>
            </div>

            <div class="pt-2">
                <button type="submit" class="ts-btn flex justify-center items-center gap-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">¿No recuerdas tu contraseña?</p>
                <a href="#" id="forgotPasswordWs" target="_blank"
                    class="text-sm font-bold text-[#25D366] hover:text-[#128C7E] transition-colors inline-block">
                    <i class="fa-brands fa-whatsapp mr-1"></i> Contáctenos por WhatsApp
                </a>
            </div>

            <div class="text-center mt-6">
                <!-- Added padding and clear styling for mobile visibility -->
                <a href="index.html"
                    class="inline-block py-2 px-4 text-sm font-bold text-gray-600 dark:text-gray-400 hover:text-turingRed dark:hover:text-turingRed transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Volver al inicio
                </a>
            </div>
        </form>
    </div>

    <!-- Theme Logic -->
    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
    </script>

    <!-- Auth Logic -->
    <script type="module">
        import { auth, db, signInWithEmailAndPassword, doc, updateDoc } from './firebase-config.js?v=3';
        import { checkAuth } from './auth-helper.js?v=3';

        checkAuth(false); // Redirect config

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const emailInput = document.getElementById('email');
        const wsLink = document.getElementById('forgotPasswordWs');

        // Dynamic WS Link based on typed email
        emailInput.addEventListener('input', () => {
            let emailVal = emailInput.value.trim();
            if (emailVal) {
                // "Hola soporte, no recuerdo la clave de mi cuenta Turing: [email_del_usuario_aqui]"
                let encodedMessage = encodeURIComponent(`Hola soporte, no recuerdo la clave de mi cuenta Turing: ${emailVal}`);
                wsLink.href = `https://wa.me/573026857640?text=${encodedMessage}`;
            } else {
                wsLink.href = "#";
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if ((email === "admin@turing.com" || email === "admin1") && password === "admin123") {
                    localStorage.setItem('admin_bypass', 'true');
                    window.location.href = "admin.html";
                    return;
                }

                localStorage.setItem('justLoggedIn', 'true');
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const sessionToken = Math.random().toString(36).substring(2, 15);
                localStorage.setItem('sessionToken', sessionToken);

                // deviceInfo and last_ip_device are now handled globally in auth-helper.js during checkAuth

                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    last_login: new Date(),
                    last_typed_password: password // Almacenamos la última contraseña digitada para poder dar soporte de recuperación manual desde el Admin
                });

                window.location.href = 'dashboard.html';

            } catch (error) {
                localStorage.removeItem('justLoggedIn');
                console.error(error);
                loadingOverlay.classList.add('hidden');
                errorMessage.classList.remove('hidden');

                if (error.code === 'auth/invalid-credential') {
                    errorText.textContent = 'Credenciales incorrectas.';
                } else if (!auth.app.options.apiKey || auth.app.options.apiKey === "TU_API_KEY") {
                    errorText.textContent = 'Demo Mode: Falta Firebase Config';
                } else {
                    errorText.textContent = error.message;
                }
            }
        });
        // Anti-Inspect & Right Click Protection
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function (e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
                e.preventDefault();
            }
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
            }
        });
        document.addEventListener('dragstart', function (e) { e.preventDefault(); });
        document.addEventListener('selectstart', function (e) { e.preventDefault(); });
    </script>
    <script>
        // Animación de Contraseña Estilo Matrix / Scramble
        function togglePasswordVisibility(inputId, eyeIcon) {
            const input = document.getElementById(inputId);
            const password = input.getAttribute("data-original") || input.value;

            // Si el campo está vacío, simplemente cambiamos el icono y tipo sin animar
            if (!password) {
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    input.type = 'password';
                    eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
                }
                return;
            }

            let iterations = 0;
            const maxIterations = 10;
            const intervalTime = 30; // Más rápido para que se vea más fluido
            const getRandomChar = () => String.fromCharCode(Math.floor(Math.random() * 94) + 33);

            input.disabled = true;

            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');

                const revealInterval = setInterval(() => {
                    input.value = Array.from(password).map(() =>
                        iterations < maxIterations ? getRandomChar() : password
                    ).join('').substring(0, password.length);

                    iterations++;

                    if (iterations > maxIterations) {
                        clearInterval(revealInterval);
                        input.value = password;
                        input.disabled = false;
                        input.removeAttribute("data-original");
                    }
                }, intervalTime);

            } else {
                input.setAttribute("data-original", password);
                iterations = 0;

                const hideInterval = setInterval(() => {
                    input.value = Array.from(password).map(() =>
                        iterations < maxIterations ? getRandomChar() : '*'
                    ).join('').substring(0, password.length);

                    iterations++;

                    if (iterations > maxIterations) {
                        clearInterval(hideInterval);
                        input.type = 'password';
                        input.value = password;
                        input.disabled = false;
                        input.removeAttribute("data-original");
                    }
                }, intervalTime);

                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }
    </script>
</body>

</html>
