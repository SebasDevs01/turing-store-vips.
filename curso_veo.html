<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Curso Veo 3.1 | Turing Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="assets/image.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Lite YouTube Embed -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@justinribeiro/lite-youtube@1/lite-youtube.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif']
                    },
                    colors: {
                        turingRed: '#E63946',
                        turingDark: '#050505',
                        turingDarkCard: '#0f0f0f'
                    }
                }
            }
        }
    </script>
    <style>
        html,
        body {
            overflow-x: hidden;
            background-color: #050505;
            color: #ffffff;
        }

        /* Aesthetics */
        .ts-title {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(230, 57, 70, 0.6);
        }

        .ts-card {
            background: #0f0f0f;
            border: 1px solid rgba(230, 57, 70, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border-radius: 16px;
        }

        .lesson-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .lesson-item:hover,
        .lesson-item.active {
            background: rgba(230, 57, 70, 0.1);
            border-left-color: #E63946;
        }

        .lesson-item.active {
            box-shadow: inset 0 0 20px rgba(230, 57, 70, 0.05);
        }

        .lesson-number {
            background: #1f2937;
            color: #9ca3af;
            transition: all 0.3s ease;
        }

        .lesson-item.active .lesson-number {
            background: #E63946;
            color: white;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }

        /* Custom Scrollbar for Sidebar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #E63946;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D62828;
        }

        /* Mobile Sidebar Toggle */
        @media (max-width: 1023px) {
            .sidebar-mobile {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar-mobile.open {
                transform: translateX(0);
            }
        }

        .video-container-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.15);
            border: 1px solid rgba(230, 57, 70, 0.3);
        }

        lite-youtube {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body
    class="min-h-screen flex flex-col bg-[radial-gradient(circle_at_80%_20%,_rgba(230,57,70,0.05)_0%,_transparent_40%),_radial-gradient(circle_at_20%_80%,_rgba(204,0,0,0.05)_0%,_transparent_40%)]">

    <!-- Header Overlay for Protection -->
    <div id="loadingOverlay"
        class="fixed inset-0 z-50 bg-[#050505] flex flex-col items-center justify-center transition-opacity duration-500">
        <div
            class="animate-spin rounded-full h-16 w-16 border-b-2 border-turingRed shadow-[0_0_15px_rgba(230,57,70,0.6)] mb-4">
        </div>
        <h2 class="ts-title text-xl text-white">Verificando Acceso VIP...</h2>
    </div>

    <!-- Mobile Header -->
    <header
        class="lg:hidden bg-black/80 backdrop-blur-md border-b border-red-900/50 p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <img src="assets/Logoblanco.png" class="w-10 h-10 object-contain drop-shadow-[0_0_10px_rgba(230,57,70,0.8)]"
                alt="Turing Logo" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
            <div>
                <h1 class="font-bold text-white ts-title uppercase text-sm">Curso Veo 3.1</h1>
            </div>
        </div>
        <button id="mobile-menu-toggle" class="p-2 text-gray-400 hover:text-white transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </header>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="lg:hidden fixed inset-0 bg-black/80 z-30 hidden backdrop-blur-sm"></div>

    <div class="flex flex-col lg:flex-row flex-grow w-full h-screen overflow-hidden">

        <!-- Sidebar Navigation -->
        <aside id="sidebar"
            class="sidebar-mobile lg:w-96 h-full flex flex-col fixed lg:relative z-40 bg-turingDarkCard border-r border-red-900/40 w-80">
            <!-- Sidebar Header -->
            <div class="p-6 border-b border-red-900/40 hidden lg:flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="assets/Logoblanco.png"
                        class="w-10 h-10 object-contain drop-shadow-[0_0_10px_rgba(230,57,70,0.8)]" alt="Turing Logo"
                        onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                    <div>
                        <h2 class="font-bold text-white ts-title uppercase text-md">Curso Veo 3.1</h2>
                    </div>
                </div>
            </div>

            <!-- Back to Dashboard -->
            <div class="p-4 border-b border-red-900/40 bg-black/20">
                <a href="dashboard.html"
                    class="flex items-center text-sm font-bold text-gray-400 hover:text-turingRed transition-colors uppercase tracking-wider">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Dashboard
                </a>
            </div>

            <!-- Lessons List -->
            <nav class="flex-1 overflow-y-auto py-2" id="lessonsContainer">
                <!-- Modules will be injected here via JS -->
            </nav>
        </aside>

        <!-- Main Video Area -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-8 relative">
            <div class="max-w-5xl mx-auto w-full">

                <div class="mb-6 flex justify-between items-end">
                    <div>
                        <span class="text-turingRed text-sm font-bold tracking-widest uppercase mb-1 block"
                            id="currentModuleTitle">Módulo 1</span>
                        <h1 class="text-2xl md:text-3xl font-bold text-white ts-title" id="currentLessonTitle">Cargando
                            Lección...</h1>
                    </div>
                </div>

                <!-- Video Component Wrapper -->
                <div class="video-container-wrapper bg-black">
                    <!-- Default state, will be updated via JS -->
                    <lite-youtube videoid="dQw4w9WgXcQ" playlabel="Reproducir Lección" params="modestbranding=1&rel=0"
                        id="videoPlayer"></lite-youtube>
                </div>

                <div class="mt-8 ts-card p-6 border-l-4 border-l-turingRed">
                    <h3 class="text-xl font-bold text-white mb-2"><i
                            class="fa-solid fa-circle-info mr-2 text-turingRed"></i> Notas de la lección</h3>
                    <p class="text-gray-400 leading-relaxed" id="currentLessonDesc">
                        Selecciona una lección del panel lateral para comenzar.
                    </p>
                </div>

            </div>
        </main>
    </div>

    <!-- Firebase y Lógica -->
    <script type="module">
        import { checkAuth } from './auth-helper.js?v=3';

        const GEM_ID = "GEM-005";

        // Estructura del curso
        const courseData = [
            {
                module: "Dominando Veo 3.1",
                lessons: [
                    { id: 1, title: "Qué vas a aprender aquí", videoId: "dQw4w9WgXcQ", desc: "Introducción al curso y expectativas." },
                    { id: 2, title: "¿Qué es Veo3.1 y por qué es la nueva ola?", videoId: "dQw4w9WgXcQ", desc: "Fundamentos y teoría sobre esta nueva tecnología IA." },
                    { id: 3, title: "Cómo usar Flow Veo3.1 GRATIS", videoId: "dQw4w9WgXcQ", desc: "Configuración inicial y trucos para empezar sin costo." },
                    { id: 4, title: "Cómo quitar tarjeta y cancelar suscripción", videoId: "dQw4w9WgXcQ", desc: "Gestión de cuenta y facturación." }
                ]
            },
            {
                module: "Práctica y Proyecto",
                lessons: [
                    { id: 5, title: "Creando tu primer video corto", videoId: "dQw4w9WgXcQ", desc: "Paso a paso para generar resultados rápidos." },
                    { id: 6, title: "Técnicas avanzadas de personalización", videoId: "dQw4w9WgXcQ", desc: "Llevando el diseño al siguiente nivel." }
                ]
            }
        ];

        let currentActiveLessonId = null;

        async function initCourse() {
            try {
                // 1. Verificar Autenticación
                const sessionAuth = await checkAuth(true);
                if (!sessionAuth) return; // Ya fue redirigido

                const { user, userData } = sessionAuth;

                // 2. Verificar que tenga el GEM-005 comprado (Seguridad Extra)
                const bypass = localStorage.getItem('admin_bypass') === 'true';
                if (!bypass) {
                    const purchased = userData?.purchased_products || [];
                    if (!purchased.includes(GEM_ID)) {
                        alert("No tienes acceso a este Curso. Serás redirigido al Dashboard.");
                        window.location.href = 'dashboard.html';
                        return;
                    }
                }

                // 3. Renderizar vista si tiene permisos
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 500);

                renderSidebar();
                loadLesson(courseData[0].lessons[0]); // Cargar primera lección por defecto

            } catch (error) {
                console.error("Error validando acceso:", error);
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    // DEMO FALLBACK LIMITADO
                    document.getElementById('loadingOverlay').style.display = 'none';
                    renderSidebar();
                    loadLesson(courseData[0].lessons[0]);
                }
            }
        }

        function renderSidebar() {
            const container = document.getElementById('lessonsContainer');
            container.innerHTML = '';
            let globalLessonCount = 1;

            courseData.forEach((mod, modIdx) => {
                // Module Header
                const modHeader = document.createElement('div');
                modHeader.className = "bg-black/40 px-6 py-4 text-xs font-bold text-turingRed tracking-widest uppercase border-y border-red-900/20";
                modHeader.innerHTML = `<i class="fa-solid fa-layer-group mr-2"></i> Módulo ${modIdx + 1}: ${mod.module}`;
                container.appendChild(modHeader);

                // Lessons
                const lessonList = document.createElement('div');
                lessonList.className = "flex flex-col py-2";

                mod.lessons.forEach(lesson => {
                    const btn = document.createElement('button');
                    btn.className = `lesson-item w-full text-left px-6 py-4 flex items-center gap-4 ${currentActiveLessonId === lesson.id ? 'active' : ''}`;
                    btn.id = `lesson-btn-${lesson.id}`;

                    btn.innerHTML = `
                        <span class="lesson-number w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0">${globalLessonCount}</span>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-white truncate group-hover:text-turingRed transition-colors">${lesson.title}</p>
                            <p class="text-xs text-gray-500 truncate mt-1"><i class="fa-solid fa-play text-[10px] mr-1"></i> Video</p>
                        </div>
                    `;

                    btn.onclick = () => {
                        loadLesson(lesson, mod.module);

                        // Handle mobile sidebar auto-close
                        if (window.innerWidth < 1024) {
                            toggleMobileMenu();
                        }
                    };

                    lessonList.appendChild(btn);
                    globalLessonCount++;
                });

                container.appendChild(lessonList);
            });
        }

        function loadLesson(lesson, moduleName = "Curso Veo 3.1") {
            // Update Active State in Sidebar
            if (currentActiveLessonId) {
                const prevBtn = document.getElementById(`lesson-btn-${currentActiveLessonId}`);
                if (prevBtn) prevBtn.classList.remove('active');
            }
            const currentBtn = document.getElementById(`lesson-btn-${lesson.id}`);
            if (currentBtn) currentBtn.classList.add('active');

            currentActiveLessonId = lesson.id;

            // Update DOM Content
            document.getElementById('currentModuleTitle').textContent = moduleName;
            document.getElementById('currentLessonTitle').textContent = lesson.title;
            document.getElementById('currentLessonDesc').textContent = lesson.desc;

            // Update Lite YouTube Element
            const videoWrapper = document.querySelector('.video-container-wrapper');
            videoWrapper.innerHTML = `<lite-youtube videoid="${lesson.videoId}" playlabel="Reproducir: ${lesson.title}" params="modestbranding=1&rel=0"></lite-youtube>`;
        }

        // --- Mobile Menu Handling ---
        const mobileToggle = document.getElementById('mobile-menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');

        function toggleMobileMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        mobileToggle.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', toggleMobileMenu);

        // --- Protecciones ---
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function (e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
                e.preventDefault();
            }
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
            }
        });

        // Initialize App
        initCourse();

    </script>
</body>

</html>
